---
- name: Ensure container folder exists.
  file:
    path: "/srv/nfs/containers"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install NFS.
  apt:
    name:
      - nfs-kernel-server

- name: Copy exports file.
  copy:
    src: "files/exports"
    dest: "/etc/exports"
  notify: reload nfs

- name: Ensure NFS server is running and set to start on boot.
  service:
    name: nfs-kernel-server
    state: started
    enabled: true
